<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --text: #e4e4e7; --muted: #9395a5;
      --accent: #6366f1; --accent-h: #818cf8;
      --green: #22c55e; --red: #ef4444;
      --radius: 8px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      width: 420px; min-height: 200px; max-height: 600px;
      overflow-y: auto; padding: 0;
    }

    /* Header */
    .header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: var(--surface); display: flex; align-items: center; gap: 8px;
    }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header h1 span { color: var(--accent); }
    .header .badge {
      font-size: 9px; padding: 2px 6px; border-radius: 10px;
      background: rgba(99,102,241,0.15); color: var(--accent-h); font-weight: 600;
    }
    .status-bar { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red); display: inline-block;
    }
    .status-dot.on { background: var(--green); }
    .key-btn {
      background: none; border: none; color: var(--muted); font-size: 13px;
      cursor: pointer; padding: 2px; transition: color 0.15s; font-family: var(--font);
    }
    .key-btn:hover { color: var(--accent-h); }

    /* Screens */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Setup screen ── */
    .setup { padding: 28px 24px; text-align: center; }
    .setup-icon { font-size: 40px; margin-bottom: 14px; }
    .setup h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .setup .subtitle {
      font-size: 12px; color: var(--muted); margin-bottom: 22px; line-height: 1.6;
    }
    .setup input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px; color: var(--text);
      font-family: var(--font); font-size: 13px; outline: none; text-align: center;
      transition: border-color 0.2s;
    }
    .setup input:focus { border-color: var(--accent); }
    .setup input::placeholder { color: var(--muted); }
    .setup .error-msg {
      font-size: 11px; color: var(--red); margin-top: 8px; min-height: 16px;
    }
    .setup .cta-btn {
      margin-top: 16px; width: 100%; padding: 11px; border: none;
      border-radius: var(--radius); background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: background 0.2s;
    }
    .setup .cta-btn:hover { background: var(--accent-h); }
    .setup .cta-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .setup .help {
      display: block; margin-top: 16px; font-size: 10px; color: var(--muted);
    }
    .setup .help a { color: var(--accent-h); text-decoration: none; }
    .setup .help a:hover { text-decoration: underline; }

    /* ── Main screen ── */
    .content { padding: 12px 16px; }
    .templates { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .chip {
      padding: 3px 10px; border-radius: 14px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 11px;
      cursor: pointer; transition: all 0.15s; font-family: var(--font);
    }
    .chip:hover, .chip.active {
      border-color: var(--accent); color: var(--accent-h);
      background: rgba(99,102,241,0.08);
    }
    .label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
    }
    textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 10px; color: var(--text);
      font-family: var(--font); font-size: 12px; resize: vertical;
      outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    #input  { min-height: 80px; }
    #output { min-height: 120px; white-space: pre-wrap; }
    .btn-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    button {
      padding: 5px 12px; border: none; border-radius: var(--radius);
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; font-family: var(--font);
    }
    .btn-primary { background: var(--accent); color: #fff; flex: 1; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent-h); }
    .btn-sm { padding: 4px 9px; font-size: 10px; }
    .divider { height: 1px; background: var(--border); margin: 10px 0; }

    .score-section { display: none; margin-top: 8px; }
    .score-section.visible { display: block; }
    .score-bar-track { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .score-label { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .score-label strong { color: var(--text); font-size: 12px; }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 10px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      padding: 5px 14px; border-radius: var(--radius);
      font-size: 11px; font-weight: 500; color: #fff;
      background: var(--green); opacity: 0; transition: all 0.25s;
      pointer-events: none; z-index: 100; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>⚡ Prompt <span>Maker</span></h1>
    <span class="badge">Extension</span>
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <button class="key-btn" id="changeTokenBtn" title="Change API token">🔑</button>
    </div>
  </div>

  <!-- ══ SCREEN 1: Setup ══ -->
  <div class="screen" id="setupScreen">
    <div class="setup">
      <div class="setup-icon">🔑</div>
      <h2>Welcome to Prompt Maker</h2>
      <p class="subtitle">
        Paste your HuggingFace API token to connect.<br>
        This powers the AI that optimizes your prompts.
      </p>
      <input type="password" id="setupTokenInput"
             placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxx" spellcheck="false" />
      <div class="error-msg" id="setupError"></div>
      <button class="cta-btn" id="setupSaveBtn">Connect & Start</button>
      <span class="help">
        Get a free token at
        <a href="https://huggingface.co/settings/tokens" target="_blank">huggingface.co/settings/tokens</a>
      </span>
    </div>
  </div>

  <!-- ══ SCREEN 2: Main ══ -->
  <div class="screen" id="mainScreen">
    <div class="content">
      <div class="templates" id="templateChips"></div>
      <div class="label">📝 Your prompt</div>
      <textarea id="input" placeholder="Type your messy prompt here…"></textarea>
      <div class="btn-row">
        <button class="btn-primary" id="generateBtn">Generate</button>
        <button class="btn-secondary" id="clearBtn">Clear</button>
      </div>
      <div class="divider"></div>
      <div class="label">✨ Optimized prompt</div>
      <textarea id="output" readonly placeholder="Optimized prompt appears here…"></textarea>
      <div class="btn-row">
        <button class="btn-secondary btn-sm" id="copyBtn">📋 Copy</button>
        <button class="btn-secondary btn-sm" id="exportBtn">💾 Export</button>
        <button class="btn-secondary btn-sm" id="scoreBtn">📊 Score</button>
      </div>
      <div class="score-section" id="scoreSection">
        <div class="score-bar-track">
          <div class="score-bar-fill" id="scoreFill"></div>
        </div>
        <p class="score-label">Quality: <strong id="scoreValue">—</strong>/100</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
